<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>温度・湿度グラフ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      .container {
        width: 80%;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <canvas id="myChart"></canvas>
    </div>

    <script>
      const ctx = document.getElementById("myChart").getContext("2d");
      new Chart(ctx, {
        type: "line",
        data: {
          labels: ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00"],
          datasets: [
            {
              label: "温度 (°C)",
              data: [22, 23, 25, 27, 26, 24],
              borderColor: "rgb(255, 99, 132)",
              yAxisID: "y",
            },
            {
              label: "湿度 (%)",
              data: [50, 48, 45, 40, 42, 47],
              borderColor: "rgb(54, 162, 235)",
              yAxisID: "y1",
            },
          ],
        },
        options: {
          responsive: true,
          scales: {
            y: {
              type: "linear",
              display: true,
              position: "left",
              title: { display: true, text: "温度 (°C)" },
            },
            y1: {
              type: "linear",
              display: true,
              position: "right",
              title: { display: true, text: "湿度 (%)" },
              grid: { drawOnChartArea: false },
            },
          },
        },
      });
    </script>
  </body>
</html>
