<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sensor Node Graph</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="card">
      <h1>Sensor Node Graph</h1>

      <p>
        現在のLED状態: <span class="status"><!--#state--></span>
      </p>

      <div class="chart-wrap">
        <canvas id="sensorChart"></canvas>
      </div>

      <hr />

      <a href="/led?status=on" class="btn on">LED点灯</a>
      <a href="/led?status=off" class="btn off">LED消灯</a>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
